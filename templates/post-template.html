<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='2' fill='%2364ffda'/%3E%3Ctext x='2' y='12' font-family='monospace' font-size='11' fill='%230a0a0a'%3E%3E_%3C/text%3E%3C/svg%3E">
        <title>{{ title }} | Shane Cardoz</title>
        <meta name="description" content="{{ description }}" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
        <link rel="stylesheet" href="../css/style.css" />
    </head>
    <body>
        <a class="skip-link" href="#main-content">Skip to content</a>
        <input
            class="theme-mode"
            type="radio"
            name="theme-mode"
            id="theme-dark"
            checked
        />
        <input
            class="theme-mode"
            type="radio"
            name="theme-mode"
            id="theme-light"
        />

        <nav class="breadcrumb-bar" aria-label="breadcrumb">
            <a href="../index.html" class="crumb-home">~</a>
            <span class="crumb-sep">/</span>
            <span class="crumb-current">{{ slug }}.html</span>
            <button class="theme-toggle" aria-label="toggle theme">&#9790;</button>
            <button class="term-toggle-mobile" aria-label="toggle terminal">&gt;_</button>
        </nav>

        <main class="content-panel" id="main-content" tabindex="-1">
            <div class="content-inner">
                <article class="page-section post-layout">
                    <header class="post-header">
                        <h1>{{ title }}</h1>
                        <p class="post-meta">
                            Published {{ date }} | Category: {{ category }} |
                            Tags: {{ tags }}
                        </p>
                    </header>

                    <p class="lead">{{ lead }}</p>

                    {{ body }}

                    <footer class="post-footer">
                        <nav class="post-nav" aria-label="post navigation">
                            <a href="{{ previous_link }}">Previous post</a>
                            <a href="index.html">Back to archive</a>
                            <a href="{{ next_link }}">Next post</a>
                        </nav>
                    </footer>
                </article>
            </div>

            <footer class="site-footer">
                <p>Reading time: {{ reading_time }}</p>
                <nav aria-label="footer">
                    <a href="../sitemap.html">Sitemap</a>
                    <a href="../rss.html">RSS Info</a>
                </nav>
            </footer>
        </main>

        <aside class="sidebar" aria-label="terminal">
            <button class="sidebar-toggle" aria-label="collapse terminal">&#9654;</button>
            <div class="terminal-window">
                <div class="terminal-titlebar">
                    <span class="terminal-title">shane@freebsd — ~</span>
                </div>
                <div id="terminal"></div>
            </div>
        </aside>

        <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
        <script src="../js/terminal.js"></script>
    </body>
</html>
