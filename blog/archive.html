<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <meta
            name="description"
            content="Chronological archive of published writing by Shane Cardoz."
        />
        <link
            rel="canonical"
            href="https://shanecardoz.github.io/blog/archive.html"
        />
        <link
            rel="alternate"
            type="application/rss+xml"
            title="Shane Cardoz RSS"
            href="https://shanecardoz.github.io/rss/feed.xml"
        />
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Shane Cardoz" />
        <meta property="og:title" content="Archive | Shane Cardoz" />
        <meta
            property="og:description"
            content="Chronological archive of published writing by Shane Cardoz."
        />
        <meta
            property="og:url"
            content="https://shanecardoz.github.io/blog/archive.html"
        />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Archive | Shane Cardoz" />
        <meta
            name="twitter:description"
            content="Chronological archive of published writing by Shane Cardoz."
        />
        <link rel="stylesheet" href="../css/style.css" />
    </head>
    <body>
        <a class="skip-link" href="#main-content">Skip to content</a>
        <input
            class="theme-mode"
            type="radio"
            name="theme-mode"
            id="theme-dark"
            checked
        />
        <input
            class="theme-mode"
            type="radio"
            name="theme-mode"
            id="theme-light"
        />

        <nav class="breadcrumb-bar" aria-label="breadcrumb">
            <a href="../index.html" class="crumb-home">~</a>
            <span class="crumb-sep">/</span>
            <span class="crumb-current">blog/archive.html</span>
            <button class="theme-toggle" aria-label="toggle theme">&#9790;</button>
        </nav>

        <main class="content-panel" id="main-content" tabindex="-1">
            <div class="content-inner">
                <section class="page-section">
                    <h1>Archive</h1>
                    <p>No archive entries yet.</p>
                </section>
            </div>

            <footer class="site-footer">
                <p>Archive pages stay static until a real content workflow is needed.</p>
                <nav aria-label="footer">
                    <a href="../sitemap.html">Sitemap</a>
                    <a href="../rss.html">RSS Info</a>
                </nav>
            </footer>
        </main>

        <aside class="sidebar" aria-label="terminal">
            <button class="sidebar-toggle" aria-label="collapse terminal">&#9654;</button>
            <div class="terminal-content">
                <div class="terminal-header">shane@freebsd</div>
                <nav class="terminal-nav" aria-label="terminal navigation">
                    <a href="../index.html" class="terminal-link">
                        ~
                        <span class="muted">home</span>
                    </a>
                    <a href="index.html" class="terminal-link">
                        blog
                        <span class="muted">ls blog/</span>
                    </a>
                    <a href="../about.html" class="terminal-link">
                        about
                        <span class="muted">cat about.txt</span>
                    </a>
                    <a href="../rss/feed.xml" class="terminal-link">
                        rss
                        <span class="muted">echo $RSS</span>
                    </a>
                </nav>
                <div class="terminal-output">
<span class="accent">$</span> <span class="highlight">ls -lt blog/</span>
(empty)
                </div>
                <div class="terminal-footer">
                    <button class="theme-toggle" aria-label="toggle theme">&#9790;</button>
                </div>
            </div>
        </aside>

        <script>
            document.querySelectorAll('.theme-toggle').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var dark = document.getElementById('theme-dark');
                    var light = document.getElementById('theme-light');
                    if (dark.checked) {
                        light.checked = true;
                    } else {
                        dark.checked = true;
                    }
                    var icon = dark.checked ? '\u263E' : '\u2600';
                    document.querySelectorAll('.theme-toggle').forEach(function(b) {
                        b.textContent = icon;
                    });
                });
            });
            document.querySelector('.sidebar-toggle').addEventListener('click', function() {
                document.querySelector('.sidebar').classList.toggle('sidebar--collapsed');
                this.textContent = this.textContent === '\u25B6' ? '\u25C0' : '\u25B6';
            });
        </script>
    </body>
</html>
